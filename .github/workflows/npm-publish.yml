name: Publish to npm

on:
  push:
    tags:
      - 'axon-parser-v*'

jobs:
  publish:
    name: Publish @axon/parser
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: axon-parser
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build WASM (all targets)
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build --lib --target wasm32-unknown-unknown --release --features wasm
          wasm-bindgen --target nodejs --out-dir pkg/node target/wasm32-unknown-unknown/release/axon_parser.wasm
          wasm-bindgen --target bundler --out-dir pkg/bundler target/wasm32-unknown-unknown/release/axon_parser.wasm
          wasm-bindgen --target web --out-dir pkg target/wasm32-unknown-unknown/release/axon_parser.wasm

      - name: Run Node.js tests
        run: node tests/node_test.js

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
