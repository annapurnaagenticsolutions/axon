name: Deploy Playground to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'axon-parser/playground/**'
      - '.github/workflows/deploy-playground.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-wasm:
    name: Build WASM Parser
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: axon-parser
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM (web target)
        run: wasm-pack build --target web -- --features wasm

      - name: Copy WASM pkg to playground
        run: |
          rm -rf playground/pkg
          cp -r pkg playground/pkg

      - name: Upload playground artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: axon-parser/playground

  deploy:
    name: Deploy to GitHub Pages
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
