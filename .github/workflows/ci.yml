name: AXON CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install AXON with development extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Audit dependency boundaries
        run: axon deps .

      - name: Audit repository hygiene
        run: axon hygiene .

      - name: Check AXON project quality gate
        run: axon check-project examples --snapshot-dir tests/snapshots/examples --require-snapshots

      - name: Check representative formatting
        run: |
          axon format examples/hello.ax > /tmp/axon_hello_formatted.ax
          axon format /tmp/axon_hello_formatted.ax --check

      - name: Smoke test generated server harness
        run: axon smoke examples/hello.ax

      - name: Run pytest suite
        run: python -m pytest
