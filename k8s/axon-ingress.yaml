apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: axon-api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: axon.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: axon-api
                port:
                  number: 8000
