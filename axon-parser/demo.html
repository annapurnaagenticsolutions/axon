<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXON Parser — WASM Demo</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.5rem; }
  textarea { width: 100%; height: 200px; font-family: monospace; font-size: 14px; }
  button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; }
  .error { color: #c00; }
  .success { color: #080; }
</style>
</head>
<body>
<h1>AXON Parser (WASM)</h1>
<p>Paste AXON source below and click <strong>Parse to IR</strong>.</p>
<textarea id="source">
agent Bot {
    model: @mock/gpt
    fn run(q: Str) -> Str { q }
}
</textarea>
<br><br>
<button id="parseBtn">Parse to IR</button>
<pre id="output">IR JSON will appear here…</pre>

<script type="module">
  import init, { parse_axon } from './pkg/axon_parser.js';

  async function main() {
    await init();
    const btn = document.getElementById('parseBtn');
    const out = document.getElementById('output');
    btn.addEventListener('click', () => {
      const src = document.getElementById('source').value;
      try {
        const json = parse_axon(src);
        out.textContent = json;
        out.className = 'success';
      } catch (e) {
        out.textContent = 'Error: ' + e;
        out.className = 'error';
      }
    });
  }
  main();
</script>
</body>
</html>
